@if (isWeb) {
  <div class="form-container-web">
    <div class="card">
      <h2 class="form-title">New Prayer Request</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">Your Prayer Request</label>
          <textarea class="form-textarea" formControlName="content" rows="6" placeholder="Share your prayer request..."></textarea>
        </div>

        <div class="form-group">
          <button type="button" class="btn btn-outline" (click)="fileInput.click()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            Add Image (Optional)
          </button>
          <input
            #fileInput
            type="file"
            accept="image/*"
            hidden
            (change)="onFileSelected($event)"
          />
        </div>

        @if (imagePreview) {
          <div class="image-preview-web">
            <img [src]="imagePreview" alt="Preview" />
            <button type="button" class="btn-remove" (click)="removeImage()">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        }

        <button type="submit" class="btn btn-primary btn-block" [disabled]="form.invalid || isLoading">
          @if (isLoading) {
            <span class="spinner"></span>
          } @else {
            Submit Prayer Request
          }
        </button>
      </form>
    </div>
  </div>
} @else {
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/prayer-requests"></ion-back-button>
      </ion-buttons>
      <ion-title>New Prayer Request</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ion-item>
        <ion-textarea formControlName="content" label="Your Prayer Request" labelPlacement="floating" rows="6"></ion-textarea>
      </ion-item>

      <div class="ion-margin-top">
        <ion-button fill="outline" (click)="fileInput.click()" type="button">
          Add Image (Optional)
        </ion-button>
        <input
          #fileInput
          type="file"
          accept="image/*"
          hidden
          (change)="onFileSelected($event)"
        />
      </div>

      @if (imagePreview) {
        <div class="image-preview">
          <img [src]="imagePreview" alt="Preview" />
          <ion-button fill="clear" color="danger" size="small" (click)="removeImage()" type="button">
            Remove
          </ion-button>
        </div>
      }

      <div style="height:80px"></div>
      <div class="sticky-submit-bar">
        <button type="submit" class="sticky-btn sticky-btn-primary sticky-btn-block" [disabled]="form.invalid || isLoading">
          @if (isLoading) { Submitting... } @else { Submit Prayer Request }
        </button>
      </div>
    </form>
  </ion-content>
}
