<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Worship Schedules</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (schedules.length === 0) {
    <p>No upcoming worship schedules.</p>
  } @else {
    <ion-list>
      @for (s of schedules; track s.id) {
        <ion-item>
          <ion-label>
            <h2>{{ s.title }}</h2>
            <p>{{ s.scheduledDate | date:'fullDate' }}</p>
            @if (s.description) {
              <p>{{ s.description }}</p>
            }
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
