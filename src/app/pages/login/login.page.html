@if (isWeb) {
  <div class="auth-split">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <img src="assets/logos/FTM Logo_white.png" alt="First Touch Ministry" class="auth-logo-web" />
        <p class="auth-tagline">Touching God. Touching People.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="form-input"
              placeholder="you@example.com"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-password-wrapper">
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                class="form-input"
                placeholder="Enter your password"
              />
              <button type="button" class="password-toggle-btn" (click)="showPassword = !showPassword">
                @if (showPassword) {
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block btn-lg"
            [disabled]="loginForm.invalid || isLoading"
          >
            @if (isLoading) {
              <span class="spinner"></span>
            } @else {
              Sign In
            }
          </button>
        </form>

        <p class="auth-footer-text">
          Don't have an account?
          <a routerLink="/verify-email">Register</a>
        </p>
      </div>
    </div>
  </div>
} @else {
  <ion-content>
    <div class="login-wrapper">
      <div class="auth-container">
        <div class="app-branding">
          <img src="assets/logos/FTM Logo_colored.png" alt="First Touch Ministry" class="login-logo" />
        </div>
        <p class="auth-description">Sign in to your account</p>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
          <ion-item>
            <ion-input
              type="email"
              formControlName="email"
              label="Email"
              labelPlacement="floating"
            ></ion-input>
          </ion-item>

          <ion-item class="password-item">
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              label="Password"
              labelPlacement="floating"
            ></ion-input>
            <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword" class="password-eye-btn" type="button">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>

          <ion-button
            expand="block"
            type="submit"
            [disabled]="loginForm.invalid || isLoading"
            class="auth-btn"
          >
            @if (isLoading) {
              <ion-spinner name="crescent"></ion-spinner>
            } @else {
              Sign In
            }
          </ion-button>
        </form>

        <div class="auth-link">
          <span>Don't have an account?</span>
          <a routerLink="/verify-email">Register</a>
        </div>
      </div>
    </div>
  </ion-content>
}
