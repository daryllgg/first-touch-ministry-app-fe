<ion-content class="ion-padding">
  <div class="pending-container">
    <ion-icon name="time-outline" class="pending-icon"></ion-icon>
    <h1>Account Pending</h1>
    <p>
      Your account is pending approval. Please check back later or contact your
      church admin.
    </p>

    <ion-button
      expand="block"
      (click)="checkStatus()"
      [disabled]="isChecking"
      class="ion-margin-top"
    >
      @if (isChecking) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Check Status
      }
    </ion-button>

    <ion-button
      expand="block"
      fill="outline"
      color="medium"
      (click)="onLogout()"
      class="ion-margin-top"
    >
      Logout
    </ion-button>
  </div>
</ion-content>
